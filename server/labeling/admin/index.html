<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritmo Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #121212; color: #E0E0E0; }
    .app { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { color: #BB86FC; margin-bottom: 4px; }
    .subtitle { color: #888; margin-bottom: 24px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #333; }
    .tab { padding: 10px 20px; background: none; border: none; color: #888; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab.active { color: #BB86FC; border-bottom-color: #BB86FC; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #1E1E1E; border-radius: 12px; padding: 16px; border: 1px solid #333; }
    .stat-value { font-size: 28px; font-weight: 800; color: #BB86FC; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    th { text-align: left; padding: 8px 12px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; }
    td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #222; }
    tr:hover td { background: #1E1E1E; }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; font-weight: 600; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; background: #1E1E1E; border: 1px solid #333;
      border-radius: 8px; color: #E0E0E0; font-size: 14px; font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #BB86FC; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #BB86FC; color: #121212; }
    .btn-danger { background: #EF5350; color: #FFF; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn:hover { opacity: 0.85; }
    .btn-row { display: flex; gap: 8px; }

    /* Announcement list */
    .ann-item { background: #1E1E1E; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid #333; }
    .ann-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .ann-title { font-weight: 700; font-size: 14px; }
    .ann-body { font-size: 13px; color: #AAA; white-space: pre-wrap; margin-bottom: 8px; }
    .ann-meta { font-size: 11px; color: #666; }
    .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    .badge-normal { background: rgba(102,187,106,0.2); color: #66BB6A; }
    .badge-important { background: rgba(187,134,252,0.2); color: #BB86FC; }
    .badge-critical { background: rgba(239,83,80,0.2); color: #EF5350; }
    .badge-active { background: rgba(102,187,106,0.2); color: #66BB6A; }
    .badge-inactive { background: rgba(120,144,156,0.2); color: #78909C; }

    .status-msg { padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status-success { background: rgba(102,187,106,0.15); color: #66BB6A; }
    .status-error { background: rgba(239,83,80,0.15); color: #EF5350; }
    .hidden { display: none; }
    .refresh-btn { background: none; border: none; color: #BB86FC; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Ritmo Admin</h1>
    <p class="subtitle">Dashboard & Management</p>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="announcements">Announcements</button>
      <button class="tab" data-tab="users">Users</button>
      <button class="tab" data-tab="crews">Crews</button>
    </div>

    <!-- Dashboard -->
    <div id="tab-dashboard" class="tab-content active">
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Announcements -->
    <div id="tab-announcements" class="tab-content">
      <h3 style="margin-bottom:12px">New Announcement</h3>
      <div id="ann-status" class="hidden"></div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="ann-title" placeholder="Announcement title">
      </div>
      <div class="form-group">
        <label>Body</label>
        <textarea id="ann-body" placeholder="Announcement body (supports line breaks)"></textarea>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="ann-priority">
          <option value="normal">Normal</option>
          <option value="important" selected>Important</option>
          <option value="critical">Critical</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="createAnnouncement()">Publish</button>

      <h3 style="margin:24px 0 12px">Existing Announcements</h3>
      <div id="ann-list"></div>
    </div>

    <!-- Users -->
    <div id="tab-users" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>Registered Users</h3>
        <button class="refresh-btn" onclick="loadUsers()">Refresh</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Provider</th><th>Joined</th></tr></thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>

    <!-- Crews -->
    <div id="tab-crews" class="tab-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>All Crews</h3>
        <button class="refresh-btn" onclick="loadCrews()">Refresh</button>
      </div>
      <table>
        <thead><tr><th>Name</th><th>Type</th><th>Members</th><th>Captain</th><th>Created</th></tr></thead>
        <tbody id="crews-table"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/admin';

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Dashboard
    async function loadDashboard() {
      const res = await fetch(API + '/stats');
      const data = await res.json();
      const grid = document.getElementById('stats-grid');
      grid.innerHTML = Object.entries(data).map(([key, val]) =>
        `<div class="stat-card"><div class="stat-value">${val}</div><div class="stat-label">${key.replace(/_/g, ' ')}</div></div>`
      ).join('');
    }

    // Announcements
    async function loadAnnouncements() {
      const res = await fetch(API + '/announcements');
      const data = await res.json();
      const list = document.getElementById('ann-list');
      list.innerHTML = data.map(a => `
        <div class="ann-item">
          <div class="ann-header">
            <span class="ann-title">${a.title}</span>
            <span>
              <span class="badge badge-${a.priority}">${a.priority}</span>
              <span class="badge badge-${a.active ? 'active' : 'inactive'}">${a.active ? 'Active' : 'Inactive'}</span>
            </span>
          </div>
          <div class="ann-body">${a.body}</div>
          <div class="ann-meta">
            ${new Date(a.created_at).toLocaleString()}
            &nbsp;|&nbsp;
            <button class="btn btn-sm btn-${a.active ? 'danger' : 'primary'}" onclick="toggleAnnouncement('${a.id}', ${!a.active})">
              ${a.active ? 'Deactivate' : 'Activate'}
            </button>
          </div>
        </div>
      `).join('') || '<p style="color:#666">No announcements</p>';
    }

    async function createAnnouncement() {
      const title = document.getElementById('ann-title').value.trim();
      const body = document.getElementById('ann-body').value.trim();
      const priority = document.getElementById('ann-priority').value;
      const status = document.getElementById('ann-status');

      if (!title || !body) { alert('Title and body required'); return; }

      const res = await fetch(API + '/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, priority }),
      });

      if (res.ok) {
        status.className = 'status-msg status-success';
        status.textContent = 'Announcement published!';
        status.classList.remove('hidden');
        document.getElementById('ann-title').value = '';
        document.getElementById('ann-body').value = '';
        loadAnnouncements();
      } else {
        status.className = 'status-msg status-error';
        status.textContent = 'Failed to publish';
        status.classList.remove('hidden');
      }
      setTimeout(() => status.classList.add('hidden'), 3000);
    }

    async function toggleAnnouncement(id, active) {
      await fetch(API + '/announcements/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ active }),
      });
      loadAnnouncements();
    }

    // Users
    async function loadUsers() {
      const res = await fetch(API + '/users');
      const data = await res.json();
      document.getElementById('users-table').innerHTML = data.map(u => `
        <tr>
          <td>${u.display_name || u.nickname || '-'}</td>
          <td>${u.email || '-'}</td>
          <td>${u.provider || '-'}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" style="color:#666">No users</td></tr>';
    }

    // Crews
    async function loadCrews() {
      const res = await fetch(API + '/crews');
      const data = await res.json();
      document.getElementById('crews-table').innerHTML = data.map(c => `
        <tr>
          <td>${c.name}</td>
          <td>${c.crew_type || 'open'}</td>
          <td>${c.member_count ?? '-'}</td>
          <td>${c.captain_name || '-'}</td>
          <td>${new Date(c.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" style="color:#666">No crews</td></tr>';
    }

    // Init
    loadDashboard();
    loadAnnouncements();
    loadUsers();
    loadCrews();
  </script>
</body>
</html>
